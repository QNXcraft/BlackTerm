name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        run: gradle --no-daemon --stacktrace clean assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk BlackTerm-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlackTerm-debug-apk
          path: BlackTerm-debug.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "BlackTerm Latest Build"
          body: "Automated build from commit ${{ github.sha }} on ${{ github.ref_name }}.\n\nThis release is automatically updated on every push to main."
          allowUpdates: true
          removeArtifacts: true
          artifacts: BlackTerm-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
